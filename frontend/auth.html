<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Habit Streak</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Login Form -->
    <div class="auth-container" id="login-container">
        <div class="auth-card">
            <div class="auth-left">
                <h1 class="auth-title">Login</h1>
                
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="login-input" 
                            class="form-input" 
                            placeholder="Username or Email"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <input 
                            type="password" 
                            id="login-password" 
                            class="form-input" 
                            placeholder="Password"
                            required
                        >
                    </div>
                    
                    <div class="remember-me">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me">
                            <span>Remember Me</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="auth-button">Login</button>
                    
                    <p class="auth-switch">
                        Don't have an account? 
                        <a href="#" id="show-register">Sign up</a>
                    </p>
                </form>
                
                <div id="login-message" class="message"></div>
            </div>
            
            <div class="auth-right">
                <h2 class="welcome-text">WELCOME BACK!</h2>
            </div>
        </div>
    </div>
    
    <!-- Register Form -->
    <div class="auth-container hidden" id="register-container">
        <div class="auth-card reverse">
            <div class="auth-left register-left">
                <h2 class="welcome-text">WELCOME!</h2>
            </div>
            
            <div class="auth-right">
                <h1 class="auth-title">Register</h1>
                
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="register-username" 
                            class="form-input" 
                            placeholder="Username"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <input 
                            type="email" 
                            id="register-email" 
                            class="form-input" 
                            placeholder="Email"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <input 
                            type="password" 
                            id="register-password" 
                            class="form-input" 
                            placeholder="Password"
                            required
                            minlength="6"
                        >
                        <small class="password-hint">Minimum 6 characters</small>
                    </div>
                    
                    <button type="submit" class="auth-button">Register</button>
                    
                    <p class="auth-switch">
                        Already have an account? 
                        <a href="#" id="show-login">Sign in</a>
                    </p>
                </form>
                
                <div id="register-message" class="message"></div>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
